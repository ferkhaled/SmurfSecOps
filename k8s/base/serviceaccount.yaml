# A dedicated ServiceAccount for the BerryShop API pod.
#
# Why not use the default ServiceAccount?
# Kubernetes automatically mounts a credential token for the default
# ServiceAccount into every pod. That token can be used to query the
# cluster API. Our app does not need cluster access, so mounting the
# token is unnecessary attack surface.
#
# automountServiceAccountToken: false prevents the token from being
# mounted at /run/secrets/kubernetes.io/serviceaccount/token.
# Try: kubectl exec into the pod and run:
#   cat /run/secrets/kubernetes.io/serviceaccount/token
# You should get "No such file or directory" — that is the expected result.
#
# Phase 4: K8s Hardening — see docs/13-k8s-hardening.md
apiVersion: v1
kind: ServiceAccount
metadata:
  name: berryshop-api
  labels:
    app.kubernetes.io/name: berryshop-api
    app.kubernetes.io/part-of: berryshop
automountServiceAccountToken: false
