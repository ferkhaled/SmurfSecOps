# Copy this file into .github/workflows/trivy-image-scan.yaml when you are ready.
name: trivy-image-scan

on:
  workflow_dispatch:
  pull_request:

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build BerryShop API image
        working-directory: app/berryshop-api
        run: docker build -t berryshop-api:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: berryshop-api:ci
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
