# Copy this file into .github/workflows/ci.yaml when you are ready to enable it.
name: berryshop-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app dependencies
        working-directory: app/berryshop-api
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: app/berryshop-api
        run: pytest

      - name: Build container image
        working-directory: app/berryshop-api
        run: docker build -t berryshop-api:${{ github.sha }} .
